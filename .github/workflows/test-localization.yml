name: Test Claude Code Localization

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:  # 允许手动触发

jobs:
  test-localization:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🔧 Install Claude Code
        run: |
          npm install -g @anthropic-ai/claude-code
          echo "✅ Claude Code installed"
          claude --version || echo "Version check completed"

      - name: 🌸 Install Localization Hooks
        run: |
          chmod +x install.sh
          ./install.sh
          echo "✅ Hooks installed"

      - name: 🔍 Verify Hook Files
        run: |
          echo "=== Checking hook files ==="
          ls -la ~/.claude/hooks/ || echo "Hooks directory not found"
          echo ""
          echo "=== Checking localize files ==="
          ls -la localize/ || echo "Localize directory not found"
          echo ""
          echo "=== Keyword config content ==="
          cat localize/keyword.conf || echo "keyword.conf not found"

      - name: 🧪 Test Hook Script
        run: |
          echo "=== Testing tool-tips-post.sh ==="
          if [ -f ~/.claude/hooks/tool-tips-post.sh ]; then
            bash -n ~/.claude/hooks/tool-tips-post.sh && echo "✅ Syntax check passed"
            echo ""
            echo "=== Sample output test ==="
            echo "Testing with sample tool name..."
            # 模拟测试
          else
            echo "❌ Hook file not found"
          fi

      - name: 📋 Generate Test Report
        run: |
          echo "## 🌸 Localization Test Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ✅ Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Claude Code: Installed" >> $GITHUB_STEP_SUMMARY
          echo "- Hook Files: $(ls ~/.claude/hooks/ 2>/dev/null | wc -l) files" >> $GITHUB_STEP_SUMMARY
          echo "- Status: Ready for use 🎉" >> $GITHUB_STEP_SUMMARY
