# ========== 快捷键映射 JSON 格式 ==========
{shortcut:"Enter/↓",action:"select"}|{shortcut:"Enter/↓",action:"选择"}
{shortcut:"↑",action:"tabs"}|{shortcut:"↑",action:"切换选项卡"}
{action:"confirm:no",context:"Settings",fallback:"Esc",description:"clear"}|{action:"confirm:no",context:"设置",fallback:"Esc",description:"清除"}
{action:"confirm:yes",context:"Settings",fallback:"Enter",description:"apply"}|{action:"confirm:yes",context:"设置",fallback:"Enter",description:"应用"}
{action:"confirm:yes",context:"FilterPicker",fallback:"Enter",description:"apply"}|{action:"confirm:yes",context:"过滤选择器",fallback:"Enter",description:"应用"}
{action:"confirm:no",context:"FilterPicker",fallback:"Esc",description:"clear"}|{action:"confirm:no",context:"过滤选择器",fallback:"Esc",description:"清除"}
{action:"filter-picker:select-all",context:"FilterPicker",fallback:"Ctrl+A",description:"select all"}|{action:"filter-picker:select-all",context:"过滤选择器",fallback:"Ctrl+A",description:"全选"}
{action:"filter-picker:select-none",context:"FilterPicker",fallback:"Ctrl+D",description:"select none"}|{action:"filter-picker:select-none",context:"过滤选择器",fallback:"Ctrl+D",description:"取消全选"}
{action:"select",context:"FilterPicker",fallback:"Enter/↓",description:"select"}|{action:"select",context:"过滤选择器",fallback:"Enter/↓",description:"选择"}
{action:"tabs",context:"FilterPicker",fallback:"↑",description:"tabs"}|{action:"tabs",context:"过滤选择器",fallback:"↑",description:"切换选项卡"}

